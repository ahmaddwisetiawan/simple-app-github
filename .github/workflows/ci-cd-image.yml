name: Build and Deploy

on: [push]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ahmaddwisetiawan/nginx-fix-banget

jobs:
  build-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ahmaddwisetiawan
          password: ${{ secrets.TOKEN_GITHUB }}

      - name: Push
        run: docker push ${{ env.IMAGE_NAME }}

  deploy:
    needs: build-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ahmaddwisetiawan
          password: ${{ secrets.TOKEN_GITHUB }}

      - name: Deploy
        run: |
          docker compose down --rmi all || true
          docker compose up -d
          sleep 5
          curl localhost:8080
